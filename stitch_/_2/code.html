<script>
        // Simple toggle switch logic for visual feedback
        document.querySelectorAll('button[role="switch"], button.relative.inline-flex').forEach(switchBtn => {
            switchBtn.addEventListener('click', function() {
                const knob = this.querySelector('span');
                const isCurrentlyOn = this.classList.contains('bg-primary');
                
                if (isCurrentlyOn) {
                    this.classList.remove('bg-primary');
                    this.classList.add('bg-surface-container-highest');
                    knob.classList.remove('translate-x-6');
                    knob.classList.add('translate-x-1');
                } else {
                    this.classList.remove('bg-surface-container-highest');
                    this.classList.add('bg-primary');
                    knob.classList.remove('translate-x-1');
                    knob.classList.add('translate-x-6');
                }
            });
        });
    </script>
